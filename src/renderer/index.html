<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doing List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <!-- Hash 路由：在 Vue 加载前补全 #/，否则 route 可能不匹配，侧栏分类区不显示 -->
    <script>
      ;(function () {
        var h = location.hash
        if (!h || h === '#') location.hash = '#/'
      })()
    </script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
